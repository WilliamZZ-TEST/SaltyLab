<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SaltyLab AI Studio</title>
  <style>
    body{margin:0;background:#282828;color:#fff;font-family:Inter,"Noto Sans SC",Arial,sans-serif}
    main{max-width:1080px;margin:0 auto;padding:64px 24px}
    h1{margin:0 0 16px;color:#c76efa;font-size:64px;line-height:1.05}
    p{color:rgba(255,255,255,.72);font-size:18px;line-height:1.8}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-top:32px}
    .card{border:1px solid rgba(255,255,255,.08);border-radius:8px;background:rgba(255,255,255,.055);padding:20px}
    a{color:#d48cff}.btn{display:inline-flex;margin-top:24px;padding:12px 18px;border-radius:8px;background:linear-gradient(135deg,#6d8cff,#c76efa);color:#fff;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <main>
    <p>AI STUDIO</p>
    <h1>SaltyLab</h1>
    <p>在线图片处理与电商 A+ 详情页生成工作台。此 Pages 页面用于项目展示；完整本地版本包含上传、任务历史、SQLite BLOB 图片空间、后台管理与 Pollinations 生成代理。</p>
    <a class="btn" href="https://github.com/">查看仓库</a>
    <section class="grid">
      <div class="card"><h2>生成工作台</h2><p>多图上传、Prompt、模型、尺寸、质量、生成方式。</p></div>
      <div class="card"><h2>图片空间</h2><p>上传图、生成图、BLOB 存储统计、缩略图预览。</p></div>
      <div class="card"><h2>任务历史</h2><p>任务状态、点数冻结、复制 ID、复制 prompt、下载。</p></div>
      <div class="card"><h2>后台管理</h2><p>用户、点数、API Key、任务数、存储量、失败率。</p></div>
    </section>
  </main>
</body>
</html>
